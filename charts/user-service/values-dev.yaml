# ──────────────────────────────────────────────────
# DEV overrides — updated by CD pipeline on dev branch push
# ──────────────────────────────────────────────────

replicaCount: 1

image:
  tag: "latest"   # <-- overwritten by common-cd.yml on every dev push

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: false

env:
  NODE_ENV: development
