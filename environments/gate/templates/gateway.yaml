---
# The Envoy Gateway that listens for HTTP traffic and parents all HTTPRoutes
# in this namespace. ReferenceGrants in finance-dev and finance-prod authorise
# the cross-namespace backendRefs used by the routes in httproutes.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: finance-gateway
  namespace: gate
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
