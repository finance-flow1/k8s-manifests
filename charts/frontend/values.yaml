# ──────────────────────────────────────────────────────────────────────
# BASE values — updated by CD pipeline (image.tag)
# ──────────────────────────────────────────────────────────────────────

replicaCount: 1

image:
  repository: aswin1015/financeflow-frontend
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  cpuUtilization: 60

probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

serviceAccount:
  name: finance-app-sa

networkPolicy:
  enabled: true

# ── Argo Rollouts ──────────────────────────────────────────────────────────
# Set rollout.enabled: true to replace the Deployment with an Argo Rollout.
# The canary steps below define the progressive traffic promotion schedule.
#
#   setWeight    → percentage of replicas running the new image
#   pause        → wait before proceeding (duration: "2m" or indefinite: {})
#   analysis     → run AnalysisTemplate gates (requires rollout.analysis.enabled)
#
rollout:
  enabled: true
  revisionHistoryLimit: 3

  canary:
    steps:
      - setWeight: 20
      - pause:
          duration: 2m
      - setWeight: 50
      - pause:
          duration: 2m
      - setWeight: 100

  # ── Analysis disabled — the zero-trust NetworkPolicy only allows ingress
  # from the gate namespace. The web HTTP probe is blocked for internal probes.
  # Re-enable when Prometheus is available and NetworkPolicy allows argo-rollouts.
  analysis:
    enabled: false
