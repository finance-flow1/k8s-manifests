{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: transaction-service-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "transaction-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "transaction-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from kgateway/Envoy proxy in gate namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gate
      ports:
        - protocol: TCP
          port: 5002
  egress:
    # Allow outbound to postgres
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow outbound to rabbitmq (producer)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
{{- end }}
