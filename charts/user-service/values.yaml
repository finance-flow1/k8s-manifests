# ──────────────────────────────────────────────────
# BASE values — updated by CD pipeline (image.tag)
# ──────────────────────────────────────────────────

replicaCount: 1

image:
  repository: aswin1015/financeflow-userservice
  pullPolicy: Always
  tag: "latest"   # <-- overwritten by common-cd.yml on every push

service:
  type: ClusterIP
  port: 5001
  targetPort: 5001

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  cpuUtilization: 70
  memoryUtilization: 80

probes:
  readiness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

env:
  PORT: "5001"
  NODE_ENV: production
  DB_HOST: postgres
  DB_PORT: "5432"

# Secret references (pre-existing K8s Secrets — NOT managed by Helm)
secrets:
  postgres: postgres-secret
  jwt: jwt-secret

serviceAccount:
  name: finance-app-sa

networkPolicy:
  enabled: true
