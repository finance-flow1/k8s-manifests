apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
data:
  init.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
        CREATE DATABASE $USER_DB_NAME;
        CREATE DATABASE $TXN_DB_NAME;
        CREATE DATABASE $NOTIFY_DB_NAME;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$USER_DB_NAME" <<-EOSQL
        CREATE TABLE IF NOT EXISTS users (
          id            SERIAL PRIMARY KEY,
          name          VARCHAR(255) NOT NULL,
          email         VARCHAR(255) UNIQUE NOT NULL,
          password_hash VARCHAR(255) NOT NULL,
          role          VARCHAR(50)  NOT NULL DEFAULT 'user',
          created_at    TIMESTAMPTZ  NOT NULL DEFAULT NOW()
        );
        CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$TXN_DB_NAME" <<-EOSQL
        CREATE TABLE IF NOT EXISTS transactions (
          id          SERIAL PRIMARY KEY,
          user_id     INTEGER        NOT NULL,
          type        VARCHAR(10)    NOT NULL CHECK (type IN ('income','expense')),
          amount      NUMERIC(12, 2) NOT NULL CHECK (amount > 0),
          category    VARCHAR(100)   NOT NULL,
          description TEXT           DEFAULT '',
          date        DATE           NOT NULL DEFAULT CURRENT_DATE,
          created_at  TIMESTAMPTZ    NOT NULL DEFAULT NOW()
        );
        CREATE INDEX IF NOT EXISTS idx_transactions_user_id ON transactions(user_id);
        CREATE INDEX IF NOT EXISTS idx_transactions_date     ON transactions(date);
        CREATE INDEX IF NOT EXISTS idx_transactions_type     ON transactions(type);
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$NOTIFY_DB_NAME" <<-EOSQL
        CREATE TABLE IF NOT EXISTS notifications (
          id         SERIAL PRIMARY KEY,
          user_id    INTEGER     NOT NULL,
          type       VARCHAR(20) NOT NULL DEFAULT 'info',
          title      TEXT        NOT NULL,
          message    TEXT,
          read       BOOLEAN     NOT NULL DEFAULT FALSE,
          created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
        );
        CREATE INDEX IF NOT EXISTS idx_notifications_user ON notifications(user_id);
        CREATE INDEX IF NOT EXISTS idx_notifications_read ON notifications(user_id, read);
    EOSQL
