---
# ── PROD: API routes ──────────────────────────────────────────────────────────
# Matches requests to prod.52.71.211.10.nip.io and routes each /api/v1/* prefix
# to the correct microservice in the finance-prod namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: finance-prod-api-routes
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
  hostnames:
    - "prod.52.71.211.10.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/auth
      backendRefs:
        - name: user-service
          namespace: finance-prod
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/users
      backendRefs:
        - name: user-service
          namespace: finance-prod
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/transactions
      backendRefs:
        - name: transaction-service
          namespace: finance-prod
          port: 5002
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/notifications
      backendRefs:
        - name: notification-service
          namespace: finance-prod
          port: 5003
---
# ── PROD: Frontend catch-all ──────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: finance-prod-frontend-route
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
  hostnames:
    - "prod.52.71.211.10.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          namespace: finance-prod
          port: 80
---
# ── DEV: API routes ───────────────────────────────────────────────────────────
# Matches requests to dev.52.71.211.10.nip.io — identical path structure to prod,
# just routes to finance-dev namespace. No /dev prefix or URLRewrite needed.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: finance-dev-api-routes
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
  hostnames:
    - "dev.52.71.211.10.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/auth
      backendRefs:
        - name: user-service
          namespace: finance-dev
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/users
      backendRefs:
        - name: user-service
          namespace: finance-dev
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/transactions
      backendRefs:
        - name: transaction-service
          namespace: finance-dev
          port: 5002
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/notifications
      backendRefs:
        - name: notification-service
          namespace: finance-dev
          port: 5003
---
# ── DEV: Frontend catch-all ───────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: finance-dev-frontend-route
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
  hostnames:
    - "dev.52.71.211.10.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          namespace: finance-dev
          port: 80
