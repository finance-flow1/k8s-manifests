replicaCount: 1

image:
  repository: postgres
  pullPolicy: IfNotPresent
  tag: "16-alpine"

service:
  type: ClusterIP
  port: 5432

storage:
  storageClassName: nfs-storage
  size: 20Gi

# Secret reference (pre-existing — NOT managed by Helm)
secrets:
  postgres: postgres-secret

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
