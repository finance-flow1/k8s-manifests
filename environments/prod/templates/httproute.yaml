---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: finance-prod-routes
  namespace: finance-prod
spec:
  parentRefs:
    - name: finance-prod-gateway
      namespace: finance-prod
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-service
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/transactions
      backendRefs:
        - name: transaction-service
          port: 5002
    - matches:
        - path:
            type: PathPrefix
            value: /api/notifications
      backendRefs:
        - name: notification-service
          port: 5003
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
