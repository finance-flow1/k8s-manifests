{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notification-service-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "notification-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "notification-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only kgateway is allowed to call this service via HTTP
    # transaction-service → notification-service communication is via RabbitMQ, not HTTP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gate
      ports:
        - protocol: TCP
          port: 5003
  egress:
    # Allow outbound to postgres (notification records)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow outbound to rabbitmq (consumer — reads events from transaction-service)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
{{- end }}
