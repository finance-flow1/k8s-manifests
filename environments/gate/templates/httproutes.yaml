---
# ── PROD: API routes — strips /api/v1/ prefix before forwarding ──────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: finance-prod-api-routes
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /auth
      backendRefs:
        - name: user-service
          namespace: finance-prod
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/users
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /users
      backendRefs:
        - name: user-service
          namespace: finance-prod
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/transactions
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /transactions
      backendRefs:
        - name: transaction-service
          namespace: finance-prod
          port: 5002
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/notifications
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /notifications
      backendRefs:
        - name: notification-service
          namespace: finance-prod
          port: 5003
---
# ── PROD: Frontend catch-all ──────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: finance-prod-frontend-route
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          namespace: finance-prod
          port: 80
---
# ── DEV: API routes — strips /dev/api/v1/ prefix before forwarding ───────────
