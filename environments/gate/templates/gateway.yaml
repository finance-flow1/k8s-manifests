---
# The kgateway-controlled Envoy proxy that listens for HTTP traffic.
# in this namespace. ReferenceGrants in finance-dev and finance-prod authorise
# the cross-namespace backendRefs used by the routes in httproutes.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: finance-gateway
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
