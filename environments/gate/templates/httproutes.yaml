---
# ── DEV: Frontend catch-all ───────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: finance-dev-frontend-route
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dev
      backendRefs:
        - name: frontend
          namespace: finance-dev
          port: 80
