          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /auth
      backendRefs:
        - name: user-service
          namespace: finance-dev
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /dev/api/v1/users
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /users
      backendRefs:
        - name: user-service
          namespace: finance-dev
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /dev/api/v1/transactions
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /transactions
      backendRefs:
