replicaCount: 1

image:
  repository: aswin1015/financeflow-notificationservice
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 5003
  targetPort: 5003

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  cpuUtilization: 70
  memoryUtilization: 80

probes:
  readiness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

env:
  PORT: "5003"
  NODE_ENV: production
  DB_HOST: postgres
  DB_PORT: "5432"

secrets:
  postgres: postgres-secret
  jwt: jwt-secret
  rabbitmq: rabbitmq-secret

serviceAccount:
  name: finance-app-sa

networkPolicy:
  enabled: true
