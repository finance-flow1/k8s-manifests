apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rabbitmq.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only transaction-service (producer) and notification-service (consumer) may connect
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: transaction-service
      ports:
        - protocol: TCP
          port: 5672
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: notification-service
      ports:
        - protocol: TCP
          port: 5672
  egress:
    # DNS only — rabbitmq does not initiate outbound connections
    - to: []
      ports:
        - protocol: UDP
          port: 53
