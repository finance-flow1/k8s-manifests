{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from kgateway/Envoy proxy in gate namespace only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gate
      ports:
        - protocol: TCP
          port: 80
  egress:
    # DNS only — frontend is a static SPA, API calls go browser → gateway → backend
    - to: []
      ports:
        - protocol: UDP
          port: 53
{{- end }}
